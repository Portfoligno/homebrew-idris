name: Update formula
on:
  workflow_call:
    inputs:
      collection_file:
        required: true
        type: string
      version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      collection_file:
        description: "Collection filename (e.g. nightly-260403.toml)"
        required: true
        type: string
      version:
        description: "Version string (e.g. 2026.04.03)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

defaults:
  run:
    shell: sh

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install tomli

      - name: Download collection TOML
        run: |
          curl -sL "https://raw.githubusercontent.com/stefan-hoeck/idris2-pack-db/main/collections/${{ inputs.collection_file }}" \
            -o collection.toml

      - name: Resolve collection
        id: resolve
        run: |
          python scripts/resolve-collection.py collection.toml > resources.json
          cat resources.json

      - name: Generate formula
        run: |
          python scripts/generate-formula.py \
            --template Formula/idris2-pack.rb.template \
            --resources resources.json \
            --version "${{ inputs.version }}" \
            --output Formula/idris2-pack.rb

      - name: Set up git
        uses: Homebrew/actions/git-user-config@main

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="update/idris2-pack-${{ inputs.version }}"

          # Delete existing remote branch if present (stale from a previous failed run)
          if git ls-remote --exit-code origin "refs/heads/$branch" >/dev/null 2>&1; then
            echo "Deleting stale remote branch $branch"
            git push origin --delete "$branch"
          fi

          git checkout -b "$branch"
          git add Formula/idris2-pack.rb
          git commit -m "idris2-pack ${{ inputs.version }}

          Update to nightly collection ${{ inputs.collection_file }}"
          git push -u origin "$branch"

          # Skip PR creation if one already exists for this branch
          existing_pr=$(gh pr list --head "$branch" --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing_pr" ]; then
            echo "PR #$existing_pr already exists for $branch, skipping creation"
          else
            gh pr create \
              --title "idris2-pack ${{ inputs.version }}" \
              --body "Automated update to nightly collection \`${{ inputs.collection_file }}\`." \
              --base main \
              --head "$branch"
          fi
