name: Update formula
on:
  workflow_call:
    inputs:
      collection_file:
        required: true
        type: string
      version:
        required: true
        type: string
    secrets:
      DEPLOY_KEY:
        required: true
  workflow_dispatch:
    inputs:
      collection_file:
        description: "Collection filename (e.g. nightly-260403.toml)"
        required: true
        type: string
      version:
        description: "Version string (e.g. 2026.04.03)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-formula

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout tap
        uses: actions/checkout@v6

      - name: Setup Hell
        uses: ./.github/actions/setup-hell

      - name: Install yq
        run: ./scripts/install-yq.hell

      - name: Update formula
        run: ./scripts/update-formula.hell "$COLLECTION_FILE" "$VERSION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COLLECTION_FILE: ${{ inputs.collection_file }}
          VERSION: ${{ inputs.version }}

      - name: Set up git
        uses: Homebrew/actions/git-user-config@main

      # Push via SSH deploy key so the push event triggers CI workflows.
      # GITHUB_TOKEN-created pushes do not trigger other workflows.
      - name: Set up SSH deploy key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Push branch and create pull request
        run: ./scripts/push-update.hell "$VERSION" "$COLLECTION_FILE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          COLLECTION_FILE: ${{ inputs.collection_file }}
          SSH_REMOTE: git@github.com:${{ github.repository }}.git
