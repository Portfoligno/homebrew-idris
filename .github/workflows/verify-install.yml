name: Verify published bottles
on:
  schedule:
    - cron: "0 12 * * 1" # Weekly on Monday at 12:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-install

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Hell
        uses: ./.github/actions/setup-hell

      - name: Verify installation
        run: ./scripts/verify-install.hell
