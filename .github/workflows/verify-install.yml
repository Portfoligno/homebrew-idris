name: Verify published bottles
on:
  schedule:
    - cron: "0 12 * * 1" # Weekly on Monday at 12:00 UTC
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: sh

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - name: Install from tap
        run: |
          brew tap Portfoligno/idris

          brew install Portfoligno/idris/idris2-pack

      - name: Verify binary
        run: pack help

      - name: Verify bottle was used
        run: |
          cellar=$(brew --cellar idris2-pack)
          version=$(brew list --versions idris2-pack | awk '{print $2}')
          receipt="$cellar/$version/INSTALL_RECEIPT.json"
          poured=$(jq -r '.poured_from_bottle' "$receipt")
          if [ "$poured" != "true" ]; then
            echo "::warning::idris2-pack was NOT installed from a bottle"
            exit 1
          fi
          echo "Installed from bottle: OK"
