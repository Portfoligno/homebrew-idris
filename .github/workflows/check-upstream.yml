name: Check upstream nightly
on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: check-upstream

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    outputs:
      has_update: ${{ steps.check.outputs.has_update }}
      collection_date: ${{ steps.check.outputs.collection_date }}
      collection_file: ${{ steps.check.outputs.collection_file }}
    steps:
      - name: Checkout tap
        uses: actions/checkout@v6

      - name: Setup Hell
        uses: ./.github/actions/setup-hell

      - name: Check for upstream updates
        id: check
        run: ./scripts/check-upstream.hell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trigger-update:
    needs: check
    if: needs.check.outputs.has_update == 'true'
    uses: ./.github/workflows/update-formula.yml
    with:
      collection_file: ${{ needs.check.outputs.collection_file }}
      version: ${{ needs.check.outputs.collection_date }}
    secrets:
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
