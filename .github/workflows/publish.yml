name: brew pr-pull
on:
  pull_request_target:
    types: [labeled]

defaults:
  run:
    shell: sh

env:
  HOMEBREW_DEVELOPER: 1
  HOMEBREW_GITHUB_ACTIONS: 1
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_FROM_API: 1

concurrency:
  group: publish-${{ github.event.pull_request.number }}

jobs:
  pr-pull:
    if: contains(github.event.pull_request.labels.*.name, 'pr-pull')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: read
      contents: write
      issues: read
      pull-requests: write
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up git
        uses: Homebrew/actions/git-user-config@main

      - name: Pull bottles
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST: ${{ github.event.pull_request.number }}
        run: >
          brew pr-pull
          --debug
          --tap="$GITHUB_REPOSITORY"
          --workflows=tests.yml
          "$PULL_REQUEST"

      - name: Push commits
        uses: Homebrew/actions/git-try-push@main
        with:
          branch: main

      - name: Create versioned formula
        id: versioned
        run: |
          version=$(sed -n 's/^  version "\([^"]*\)".*/\1/p' Formula/idris2-pack.rb)
          echo "version=$version" >> "$GITHUB_OUTPUT"

          class_suffix=$(echo "$version" | tr -d '.')
          versioned_file="Formula/idris2-pack@${version}.rb"

          cp Formula/idris2-pack.rb "$versioned_file"

          # Rename class: Idris2Pack -> Idris2PackATYYYYMMDD
          sed -i "s/^class Idris2Pack < Formula$/class Idris2PackAT${class_suffix} < Formula/" \
            "$versioned_file"

          # Insert keg_only :versioned_formula after the license line
          sed -i 's/^\(  license ".*"\)$/\1\n\n  keg_only :versioned_formula/' \
            "$versioned_file"

      - name: Repackage bottles for versioned formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.versioned.outputs.version }}
        run: |
          tag="idris2-pack-${VERSION}"
          versioned_file="Formula/idris2-pack@${VERSION}.rb"
          workdir=$(mktemp -d)

          # List bottle assets from the release
          assets=$(gh release view "$tag" --json assets -q '.assets[].name' \
            | grep '\.bottle\.tar\.gz$')

          for asset in $assets; do
            gh release download "$tag" --pattern "$asset" --dir "$workdir"

            # Extract
            tar -xf "$workdir/$asset" -C "$workdir"

            # Rename internal directory: idris2-pack -> idris2-pack@VERSION
            mv "$workdir/idris2-pack" "$workdir/idris2-pack@${VERSION}"

            # Rename receipt JSON inside .brew/
            brew_dir="$workdir/idris2-pack@${VERSION}/${VERSION}/.brew"
            if [ -d "$brew_dir" ]; then
              for json in "$brew_dir"/idris2-pack--*.json; do
                [ -f "$json" ] || continue
                new_json=$(echo "$json" | sed "s|/idris2-pack--|/idris2-pack@${VERSION}--|")
                mv "$json" "$new_json"
              done
            fi

            # Repackage with versioned name
            versioned_name=$(echo "$asset" \
              | sed "s/^idris2-pack-/idris2-pack@${VERSION}--/")
            tar -czf "$workdir/$versioned_name" \
              -C "$workdir" "idris2-pack@${VERSION}"

            # Compute new SHA256 and update the versioned formula
            new_sha=$(sha256sum "$workdir/$versioned_name" | cut -d' ' -f1)
            os_tag=$(echo "$asset" \
              | sed "s/^idris2-pack-${VERSION}\.\(.*\)\.bottle\.tar\.gz$/\1/")
            sed -i "s|\(sha256 cellar: :any, *${os_tag}: *\)\"[a-f0-9]*\"|\1\"${new_sha}\"|" \
              "$versioned_file"

            # Upload repackaged bottle
            gh release upload "$tag" "$workdir/$versioned_name" --clobber

            # Cleanup iteration
            rm -rf \
              "$workdir/idris2-pack@${VERSION}" \
              "$workdir/$asset" \
              "$workdir/$versioned_name"
          done

          rm -rf "$workdir"

      - name: Commit and push versioned formula
        env:
          VERSION: ${{ steps.versioned.outputs.version }}
        run: |
          git add "Formula/idris2-pack@${VERSION}.rb"
          git commit -m "idris2-pack@${VERSION}: versioned formula snapshot"
          git push origin main

      - name: Delete branch
        if: github.event.pull_request.head.repo.fork == false
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: git push --delete origin "$BRANCH"
