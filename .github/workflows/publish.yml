name: brew pr-pull

# AUTO-PUBLISH TRIGGER (replaces the human `pr-pull` label gate).
# Fires when the bottle-build CI ("brew test-bot" / tests.yml) finishes.
# Safety is upstream's (pack-db STATUS.md, honored by check-upstream.hell) and
# the consumer's (brew upgrade timing + idris2-pack-pin pinning), never the
# tap's, so there is deliberately no human label and no approval here.
on:
  workflow_run:
    workflows: ["brew test-bot"]   # matches tests.yml `name:`
    types: [completed]
  workflow_dispatch:               # manual escape hatch (NOT a gate)
    inputs:
      pr_number:
        description: "PR number to pr-pull"
        required: true
        type: string

env:
  HOMEBREW_DEVELOPER: 1
  HOMEBREW_GITHUB_ACTIONS: 1
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_FROM_API: 1
  HOMEBREW_GIT_NAME: "github-actions[bot]"
  HOMEBREW_GIT_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"

# Serialize per source branch (auto) or dispatch PR (manual); never cancel a
# half-done publish.
concurrency:
  group: publish-${{ github.event.workflow_run.head_branch || github.event.inputs.pr_number }}
  cancel-in-progress: false

jobs:
  pr-pull:
    # Publish only when triggered manually, OR when the test-bot run:
    #   - concluded success,
    #   - was for an update/** branch (a routine main push also concludes
    #     success but builds no bottles -- this guard is MANDATORY), and
    #   - originated in THIS repo (forks cannot own update/**).
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'update/') &&
       github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up git
        uses: Homebrew/actions/git-user-config@main
        with:
          username: "github-actions[bot]"

      - name: Setup Hell
        uses: ./.github/actions/setup-hell

      - name: Resolve update PR
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          PR_INPUT: ${{ github.event.inputs.pr_number }}
        run: ./scripts/resolve-update-pr.hell

      - name: Pull bottles
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST: ${{ steps.resolve.outputs.pr_number }}
        run: >
          brew pr-pull
          --debug
          --tap="$GITHUB_REPOSITORY"
          --workflows=tests.yml
          "$PULL_REQUEST"

      - name: Push commits
        uses: Homebrew/actions/git-try-push@main
        with:
          branch: main

      - name: Repackage bottles and record SHAs in versions.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/create-versioned-formula.hell

      - name: Commit and push versions.json
        run: ./scripts/commit-versioned-formula.hell

      - name: Delete branch
        env:
          BRANCH: ${{ steps.resolve.outputs.branch }}
        run: git push --delete origin "$BRANCH"
