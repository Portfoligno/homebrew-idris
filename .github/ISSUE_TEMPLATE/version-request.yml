name: Version request
description: Request an update to a specific nightly collection
labels: ["enhancement"]
body:
  - type: input
    id: collection
    attributes:
      label: Collection name
      description: The pack-db nightly collection to target
      placeholder: "nightly-260403.toml"
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: Why this specific collection is needed
    validations:
      required: true
